<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    <title>Contato</title>
</head>
<body>
    <header>
        <table class="navbar navbar-dark">
            <tr>
                <td><a href="index.html">Home</a></td>
                <td><a href="destino.html">Destino</a></td>
                <td><a href="promocao.html">Promoções</a></td>
                <td><a href="contato.html">Contato</a></td>
            </tr>
        </table>
    </header>
    <main>
        <h1>Contato</h1>
        <h3>A TravelAirlines preza pela comunicação.</h3><hr><br><br>
        <div class="contato">
            <img src="./imagens/contato.png" alt="">
        </div>
        <form>
            <div class="form-row">
              <div class="form-group col-md-5">
                <label for="nome">Nome:</label>
                <input type="text" class="form-control" id="nome" placeholder="Nome completo">
              </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-5">
                    <label for="email">Email:</label>
                    <input type="text" class="form-control" id="email" placeholder="Digite aqui seu email">
                  </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-5">
                    <label for="telefone">Telefone:</label>
                    <input type="text" class="form-control" id="telefone" placeholder="Digite aqui seu contato">
                </div>
            </div>
            <form>
                <div class="form-group">
                <div class="form-group">
                  <label for="areadetexto">Contato:</label>
                  <textarea style="border-radius: 8px; width: 750px;" class="form-control" id="areadetexto" placeholder="Digite a sua opinião..."  rows="6"></textarea>
                </div>
              </form>
            <button type="submit" class="btn btn-dark">Enviar</button>
          </form>
    </main>    
    <footer>
        <div class="row2">
            <img src="./imagens/contacto.png" alt="contato">
        </div>
        <div class="rodape">&copy; 2022 Copyright - Todos os direitos reservados. TravelAirlines Tecnologia</div>
    </footer>
</body>
</html>
